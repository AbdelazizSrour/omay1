<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>خدماتنا</title>

<style>

body {
    font-family: 'Cairo', sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    font-size: 18px;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #020617;
    box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
}

.logo img { height: 55px; }

.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}

.nav-links a {
    color: white;
    text-decoration: none;
    position: relative;
}

.nav-links a:hover {
    color: #facc15;
}

.nav-links a::after {
    content: "";
    position: absolute;
    bottom: -5px;
    right: 0;
    width: 0;
    height: 2px;
    background: #facc15;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

/* CONTENT */
.container { padding: 40px; }

h1 {
    text-align: center;
    font-size: 32px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #facc15;
}

.price { color: #22c55e; }

button {
    background: #3b82f6;
    padding: 10px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #facc15;
    color: black;
    box-shadow: 0 0 15px #facc15;
}

/* POPUP */
.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    max-width: 700px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    white-space: pre-line;
}

.whatsapp-btn {
    margin-top: 20px;
    background: #25D366;
    width: 100%;
}
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    z-index: 999999; /* دي أهم حاجة */
}
</style>
</head>

<body>

<header class="navbar">
<ul class="nav-links">
<li><a href="index.html">الرئيسية</a></li>
<li><a href="services.html">الخدمات</a></li>
<li><a href="about.html">من نحن</a></li>
<li><a href="contact.html">تواصل</a></li>
</ul>

<div class="logo">
<img src="images/logo.png">
</div>
</header>

<div class="container">
<h1>خدماتنا المحاسبية</h1>
<div class="cards" id="cards"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closePopup()">
<div class="popup-content" onclick="event.stopPropagation()">
<span onclick="closePopup()" style="cursor:pointer;color:red">✖</span>
<h2 id="title"></h2>
<p id="details"></p>
<button class="whatsapp-btn" id="orderBtn">اطلب الخدمة</button>
</div>
</div>

<script>

let services = [

{
name:"برنامج محاسبي مخصص",
price:"يبدأ من 1500 جنيه",
details:`اعداد برامج محاسبية مخصصة للمنشأة سواء كانت محل او شركة صغيرة او شركة متوسطة
• برامج جاهزة لإدارة منشأتك واجهة سهلة و بسيطة ليك حتى لو مش محاسب
• تقارير لحظية أرباح و خسائر و مخزون و غيرها من التقارير
• يدعم تسجيل المبيعات و المشتريات و الحسابات كاملة
• إعداد القوائم المالية بدقة
• هينظملك المخزن و الخزنة و حسابات البنوك و الشيكات و حسابات العملاء و الموردين
• معرفة الأرباح الحقيقية للشركة

مدة التنفيذ: من 3 الى 7 أيام
التسليم: نسخة كاملة + ملف شرح + تدريب
السعر: يبدأ من 1500 جنيه`
},

{
name:"استشارات محاسبية",
price:"200 - 500 جنيه",
details:`تقديم استشارات محاسبية و ضريبية و مالية
• مراجعة وضع المؤسسة
• تحسين الأداء المالي
• تقليل الضرائب`
},

{
name:"محاسب Part Time",
price:"4000 جنيه",
details:`محاسب متخصص لإدارة حساباتك شهريًا
بدون الحاجة لتوظيف دائم`
},

{
name:"Payroll",
price:"20 جنيه لكل موظف",
details:`حساب المرتبات
التأمينات
الضرائب
تقارير شهرية`
},

{
name:"نظام ضبط التكاليف",
price:"يبدأ من 2000 جنيه",
details:`تحليل التكاليف
تقارير أسبوعية
تحسين الربحية`
},

{
name:"إدارة المخازن",
price:"يبدأ من 2500 جنيه",
details:`تنظيم المخزون
تقارير وتحليلات
ربط بالمحاسبة`
},

{
name:"دراسة جدوى",
price:"يبدأ من 3000 جنيه",
details:`تحليل مالي وفني وتسويقي للمشروع`
},

{
name:"مراجعة حسابات",
price:"1500 جنيه شهريًا",
details:`فحص العمليات المحاسبية وتحسين الرقابة`
},

{
name:"إقرارات ضريبية",
price:"600 جنيه",
details:`إعداد وتقديم الإقرارات الضريبية`
},

{
name:"تأسيس شركة",
price:"4000 جنيه",
details:`إنشاء نظام محاسبي كامل من البداية`
}

];

let container = document.getElementById("cards");

services.forEach((s,i)=>{
container.innerHTML += `
<div class="card">
<h3>${s.name}</h3>
<p>${s.details.split('\n')[0]}</p>
<div class="price">${s.price}</div>
<button onclick="openPopup(${i})">عرض التفاصيل</button>
</div>
`;
});

function openPopup(i){

let s = services[i];

let popup = document.getElementById("popup");

popup.style.display = "flex";
popup.style.justifyContent = "center";
popup.style.alignItems = "center";

document.getElementById("title").innerText = s.name;
document.getElementById("details").innerText = s.details;

document.getElementById("orderBtn").onclick = function(){

let phone="201234567890";

let msg=`السلام عليكم
عايز أطلب خدمة:
${s.name}

التفاصيل:
${s.details}

السعر:
${s.price}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
};

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
